<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Harry Potter TCG Card + Q&A Viewer</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; }
    input { padding: 6px 10px; width: 90%; max-width: 350px; margin-bottom: 12px; }

    /* ★ フィルタ UI */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }
    .filters select {
      padding: 4px 6px;
    }

    /* ★ 列幅が変わらない固定レイアウト */
    table {
      border-collapse: collapse;
      width: auto;
      max-width: 100%;
      font-size: 14px;
      margin-bottom: 40px;
      table-layout: fixed;
    }

    th, td { border: 1px solid #ccc; padding: 4px 6px; vertical-align: top; }

    /* ★ ソート矢印で列幅が変わらないようにする */
    th {
      background: #f0f0f0;
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    th:hover { background: #e0e0e0; }

    th::after {
      content: " ▲";
      font-size: 12px;
      visibility: hidden;
    }
    th.sort-asc::after { content: " ▲"; visibility: visible; }
    th.sort-desc::after { content: " ▼"; visibility: visible; }

    tbody tr:nth-child(odd) { background: #fafafa; }
    details { margin: 4px 0; }
    summary { cursor: pointer; font-weight: bold; }
    .qa-text { margin-left: 10px; padding: 4px; }

    /* ★ 列幅最適化 */
    th:nth-child(1), td:nth-child(1) { width: 140px; }
    th:nth-child(2), td:nth-child(2) { width: 80px; }
    th:nth-child(3), td:nth-child(3) { width: 60px; }
    th:nth-child(4), td:nth-child(4) { width: 50px; }
    th:nth-child(5), td:nth-child(5) { width: 50px; }
    th:nth-child(6), td:nth-child(6) { width: 50px; }
    th:nth-child(7), td:nth-child(7) { width: 90px; }
    th:nth-child(8), td:nth-child(8) { width: 120px; }
    th:nth-child(9), td:nth-child(9) { width: 300px; }
    th:nth-child(10), td:nth-child(10) { width: 120px; }
    th:nth-child(11), td:nth-child(11) { width: 60px; }

    /* ★ Q&A だけ折り返し */
    td:nth-child(10) details,
    td:nth-child(10) .qa-text {
      white-space: normal !important;
      overflow: visible;
      text-overflow: clip;
    }

    /* 他の列は省略表示 */
    td {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 600px) {
      table { font-size: 12px; }
      th, td { padding: 3px; }
      body { padding: 8px; }
      input { width: 100%; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>

  <h1>Harry Potter TCG Card + Q&A Viewer</h1>

  <!-- ★ フィルタ UI -->
  <div class="filters">
    <select id="filter-rarity">
      <option value="">レアリティ（全て）</option>
    </select>

    <select id="filter-cost">
      <option value="">コスト（全て）</option>
    </select>

    <select id="filter-type">
      <option value="">タイプ（全て）</option>
    </select>

    <select id="filter-tag">
      <option value="">タグ（全て）</option>
    </select>

    <select id="filter-product">
      <option value="">収録（全て）</option>
    </select>
  </div>

  <input id="search" type="text" placeholder="カード名・番号・効果テキスト・Q&A で検索">

  <table id="table">
    <thead>
      <tr>
        <th data-key="name">カード名</th>
        <th data-key="number">カード番号</th>
        <th data-key="rarity">レアリティ</th>
        <th data-key="cost">コスト</th>
        <th data-key="ap">AP</th>
        <th data-key="dp">DP</th>
        <th data-key="type">タイプ</th>
        <th data-key="tags">タグ</th>
        <th data-key="text">効果テキスト</th>
        <th>Q&A</th>
        <th data-key="product">収録</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const CARD_TSV = 'HarryPotterTCG_DT.tsv';
    const QA_TSV = 'HarryPotterTCG_QA.tsv';

    function shortProductName(name) {
      if (name.includes("スターターデッキ／グリフィンドール")) return "S_G";
      if (name.includes("スターターデッキ／スリザリン")) return "S_S";
      if (name.includes("ブースターパック")) return "B_P1";
      if (name.includes("マスターズ・グリンドルバルド")) return "M_P1";
      return name;
    }

    async function loadTSV(url) {
      const res = await fetch(url);
      const text = await res.text();
      return text.trim().split(/\r?\n/).map(line => line.split('\t'));
    }

    async function loadData() {
      const cardLines = await loadTSV(CARD_TSV);
      const qaLines = await loadTSV(QA_TSV);

      const cards = cardLines.slice(1).map(cols => ({
        name: cols[0],
        number: cols[1],
        rarity: cols[2],
        cost: cols[3],
        ap: cols[4],
        dp: cols[5],
        type: cols[6],
        tags: cols[7],
        product: cols[8],
        text: cols[9],
        qas: []
      }));

      const qaList = qaLines.slice(1).map(cols => ({
        name: cols[0],
        number: cols[1],
        qid: cols[2],
        qa: cols[3],
        updated: cols[4]
      }));

      for (const q of qaList) {
        const card = cards.find(c => c.number === q.number);
        if (card) card.qas.push(q);
      }

      return cards;
    }

    function populateFilters(cards) {
      const raritySet = new Set();
      const costSet = new Set();
      const typeSet = new Set();
      const tagSet = new Set();
      const productSet = new Set();

      cards.forEach(c => {
        raritySet.add(c.rarity);
        costSet.add(c.cost);
        typeSet.add(c.type);
        c.tags.split("／").forEach(t => tagSet.add(t.trim()));
        productSet.add(shortProductName(c.product));
      });

      function fillSelect(id, values) {
        const sel = document.getElementById(id);
        [...values].sort().forEach(v => {
          const op = document.createElement("option");
          op.value = v;
          op.textContent = v;
          sel.appendChild(op);
        });
      }

      fillSelect("filter-rarity", raritySet);
      fillSelect("filter-cost", costSet);
      fillSelect("filter-type", typeSet);
      fillSelect("filter-tag", tagSet);
      fillSelect("filter-product", productSet);
    }

    function applyFilters(cards) {
      const r = document.getElementById("filter-rarity").value;
      const c = document.getElementById("filter-cost").value;
      const t = document.getElementById("filter-type").value;
      const g = document.getElementById("filter-tag").value;
      const p = document.getElementById("filter-product").value;
      const q = document.getElementById("search").value.toLowerCase();

      return cards.filter(card => {
        if (r && card.rarity !== r) return false;
        if (c && card.cost !== c) return false;
        if (t && card.type !== t) return false;
        if (g && !card.tags.includes(g)) return false;
        if (p && shortProductName(card.product) !== p) return false;

        if (q) {
          const hit =
            card.name.toLowerCase().includes(q) ||
            card.number.toLowerCase().includes(q) ||
            card.rarity.toLowerCase().includes(q) ||
            card.cost.toLowerCase().includes(q) ||
            card.ap.toLowerCase().includes(q) ||
            card.dp.toLowerCase().includes(q) ||
            card.type.toLowerCase().includes(q) ||
            card.tags.toLowerCase().includes(q) ||
            card.product.toLowerCase().includes(q) ||
            card.text.toLowerCase().includes(q) ||
            card.qas.some(qa => qa.qa.toLowerCase().includes(q));
          if (!hit) return false;
        }

        return true;
      });
    }

    function renderTable(cards) {
      const tbody = document.querySelector('#table tbody');
      tbody.innerHTML = '';

      for (const c of cards) {
        const tr = document.createElement('tr');

        const qaHtml = c.qas.length
          ? c.qas.map(q => `
              <details>
                <summary>Q${q.qid}（更新日: ${q.updated}）</summary>
                <div class="qa-text">${q.qa}</div>
              </details>
            `).join('')
          : '—';

        tr.innerHTML = `
          <td>${c.name}</td>
          <td>${c.number}</td>
          <td>${c.rarity}</td>
          <td>${c.cost}</td>
          <td>${c.ap}</td>
          <td>${c.dp}</td>
          <td>${c.type}</td>
          <td>${c.tags}</td>
          <td>${c.text}</td>
          <td>${qaHtml}</td>
          <td title="${c.product}">${shortProductName(c.product)}</td>
        `;

        tbody.appendChild(tr);
      }
    }

    (async () => {
      let cards = await loadData();
      populateFilters(cards);
      renderTable(cards);

      /* ★ フィルタイベント */
      document.querySelectorAll(".filters select").forEach(sel => {
        sel.addEventListener("change", () => {
          renderTable(applyFilters(cards));
        });
      });

      /* ★ 検索 */
      document.getElementById("search").addEventListener("input", () => {
        renderTable(applyFilters(cards));
      });

      /* ★ ソート */
      let sortState = {};
      document.querySelectorAll('th[data-key]').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.key;

          sortState[key] = !sortState[key];

          document.querySelectorAll('th[data-key]').forEach(h => {
            h.classList.remove('sort-asc', 'sort-desc');
          });

          th.classList.add(sortState[key] ? 'sort-asc' : 'sort-desc');

          cards.sort((a, b) => {
            let A = a[key];
            let B = b[key];

            if (["cost", "ap", "dp"].includes(key)) {
              A = Number(A);
              B = Number(B);
              return sortState[key] ? A - B : B - A;
            }

            if (key === "number") {
              const numA = Number(A.replace(/[^0-9]/g, ""));
              const numB = Number(B.replace(/[^0-9]/g, ""));
              return sortState[key] ? numA - numB : numB - numA;
            }

            return sortState[key]
              ? A.localeCompare(B, 'ja')
              : B.localeCompare(A, 'ja');
          });

          renderTable(applyFilters(cards));
        });
      });
    })();
  </script>

</body>
</html>
